name: AlluSkyRocketStocks v2

# One clean EOD run per market. The old "hourly" comment was wrong —
# the cron only ever fired once a day anyway. EOD is the design now.
on:
  schedule:
    - cron: "15 21 * * 1-5"   # 21:15 UTC = ~4:15pm ET, just after US close
    - cron: "30 10 * * 1-5"   # 10:30 UTC = 4:00pm IST, after NSE close
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide market from trigger time
        id: mkt
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "markets=US IN" >> "$GITHUB_OUTPUT"   # manual run does both
          elif [ "$HOUR" -ge 15 ]; then
            echo "markets=US" >> "$GITHUB_OUTPUT"
          else
            echo "markets=IN" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan
        run: |
          for m in ${{ steps.mkt.outputs.markets }}; do
            python scanner.py "$m"
            python analyzer.py "$m"
          done

      - name: Export dashboard payload
        run: python export_dashboard.py

      - name: Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_digest.py || echo "digest failed (non-fatal)"

      - name: Commit results
        run: |
          git config user.name  "asr-bot"
          git config user.email "actions@github.com"
          git add data/asr.db data.json
          if ! git diff --cached --quiet; then
            git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes."
          fi
