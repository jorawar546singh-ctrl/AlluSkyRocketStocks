<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlluSkyRocketStocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0B0D; --panel:#141417; --panel2:#1A1A1E;
    --ink:#F5F5F0; --sec:#A8A8A0; --hair:#2A2A30;
    --amber:#FFB224; --amber-dim:rgba(255,178,36,.14);
    --green:#3DDC84; --green-dim:rgba(61,220,132,.12);
    --red:#FF5C5C;  --red-dim:rgba(255,92,92,.10);
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --grot:'Space Grotesk',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:var(--grot);
       font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px 96px}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .up{color:var(--green)} .down{color:var(--red)} .acc{color:var(--amber)}

  header{display:flex;align-items:baseline;justify-content:space-between;
         padding:26px 0 18px;border-bottom:1px solid var(--hair);flex-wrap:wrap;gap:12px}
  .brand{font-weight:700;letter-spacing:.05em;font-size:16px}
  .brand span{color:var(--sec);font-weight:400}
  .hdr-right{display:flex;align-items:baseline;gap:28px}
  .toggle button{background:none;border:none;color:var(--sec);padding:4px 14px;cursor:pointer;
       font-family:var(--mono);font-size:13px;letter-spacing:.12em;border-bottom:2px solid transparent}
  .toggle button.on{color:var(--ink);border-bottom-color:var(--amber)}
  .stamp{font-family:var(--mono);font-size:11px;color:var(--sec)}

  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--sec);
       text-transform:uppercase;margin:42px 0 14px;display:flex;gap:14px;align-items:baseline}
  .lbl .meta{color:var(--sec);opacity:.8;letter-spacing:.06em}

  /* ---------- primary candidate ---------- */
  .primary{border:1px solid var(--hair);background:var(--panel);padding:26px 28px;
           display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:center}
  .primary .tick{font-family:var(--mono);font-size:38px;font-weight:600}
  .primary .tick small{display:block;font-size:11px;color:var(--sec);letter-spacing:.16em;
                       text-transform:uppercase;margin-top:4px;font-family:var(--grot)}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:18px}
  .stat b{display:block;font-family:var(--mono);font-size:17px;font-weight:500}
  .stat span{font-size:10px;color:var(--sec);letter-spacing:.1em;text-transform:uppercase}
  .rsmeter{grid-column:1/-1;height:3px;background:var(--hair);position:relative;margin-top:4px}
  .rsmeter i{position:absolute;inset:0 auto 0 0;background:var(--amber)}
  .ptrigger{font-family:var(--mono);font-size:12px;color:var(--amber);text-align:right;letter-spacing:.1em}
  .empty{border:1px solid var(--hair);padding:36px 28px;color:var(--sec);
         font-family:var(--mono);font-size:13px;background:var(--panel)}

  /* ---------- filter bar ---------- */
  .fbar{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;margin-bottom:8px}
  .fbar .grp{display:flex;gap:8px;align-items:center}
  .fbar label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--sec);
              text-transform:uppercase}
  select,input[type=number]{background:var(--panel);border:1px solid var(--hair);color:var(--ink);
       font-family:var(--mono);font-size:12px;padding:7px 10px;outline:none;width:88px}
  select{width:auto}
  select:focus,input:focus{border-color:var(--sec)}
  .btn{background:var(--panel);border:1px solid var(--hair);color:var(--sec);cursor:pointer;
       font-family:var(--mono);font-size:11px;letter-spacing:.12em;padding:8px 14px;text-transform:uppercase}
  .btn:hover{color:var(--ink);border-color:var(--sec)}
  .btn.on{color:#0B0B0D;font-weight:600}
  .btn.on.f-all{background:var(--ink);border-color:var(--ink)}
  .btn.on.f-win{background:var(--green);border-color:var(--green)}
  .btn.on.f-TRENDING{background:var(--amber);border-color:var(--amber)}
  .btn.on.f-FADING{background:var(--red);border-color:var(--red)}
  .btn.on.f-WATCHING{background:var(--sec);border-color:var(--sec)}
  .btn.on.f-chk{background:var(--panel2);color:var(--green);border-color:var(--green)}
  .showing{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--sec);letter-spacing:.1em}

  /* ---------- badges ---------- */
  .bdg{font-family:var(--mono);font-size:9px;letter-spacing:.12em;padding:3px 7px;
       margin-left:8px;vertical-align:2px;font-weight:600}
  .b-new{color:var(--green);border:1px solid var(--green)}
  .b-TRENDING{background:var(--amber);color:#0B0B0D}
  .b-WATCHING{color:var(--sec);border:1px solid var(--hair);background:var(--panel2)}
  .b-FADING{color:var(--red);border:1px solid var(--red)}

  /* ---------- table ---------- */
  table{width:100%;border-collapse:collapse}
  thead th{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--sec);
       text-transform:uppercase;text-align:right;padding:12px;cursor:pointer;
       border-bottom:1px solid var(--hair);user-select:none;white-space:nowrap}
  thead th:first-child{text-align:left}
  thead th.sorted{color:var(--amber)}
  tbody td{font-family:var(--mono);font-size:13.5px;text-align:right;padding:13px 12px;
       border-bottom:1px solid var(--hair);white-space:nowrap}
  tbody td:first-child{text-align:left}
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:var(--panel)}
  tbody tr.sel td{background:var(--amber-dim)}
  .tick-cell{font-weight:600;font-size:15px;letter-spacing:.04em}
  .sub{color:var(--sec);font-size:11.5px}
  .chk{color:var(--green)} .x{color:var(--red)}

  /* ---------- detail ---------- */
  .detail{border:1px solid var(--hair);background:var(--panel);padding:24px 28px;
          margin-top:16px;display:none}
  .detail.on{display:block}
  .detail h3{font-family:var(--mono);font-size:20px;font-weight:600;margin-bottom:18px}
  .detail h3 em{font-style:normal;color:var(--sec);font-size:12px;margin-left:14px;font-weight:400}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:18px 24px}
  .links{margin-top:20px;display:flex;gap:24px}
  .links a{color:var(--sec);font-family:var(--mono);font-size:12px;text-decoration:none;
           border-bottom:1px solid var(--hair);padding-bottom:2px}
  .links a:hover{color:var(--amber);border-bottom-color:var(--amber)}
  .sizing{margin-top:20px;padding-top:16px;border-top:1px solid var(--hair);
          font-family:var(--mono);font-size:12px;color:var(--sec)}
  .sizing b{color:var(--ink)}

  /* ---------- positions / edge ---------- */
  .strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .pos{border:1px solid var(--hair);background:var(--panel);padding:18px 20px}
  .pos .t{font-family:var(--mono);font-size:16px;font-weight:600;margin-bottom:10px}
  .pos .row{display:flex;justify-content:space-between;font-family:var(--mono);
            font-size:12px;color:var(--sec);padding:3px 0}
  .pos .row b{color:var(--ink);font-weight:400}
  .edge{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;
        background:var(--hair);border:1px solid var(--hair)}
  .edge .cell{background:var(--panel);padding:20px}
  .edge b{display:block;font-family:var(--mono);font-size:24px;font-weight:600}
  .edge span{font-size:10px;color:var(--sec);letter-spacing:.12em;text-transform:uppercase}
  .note{font-family:var(--mono);font-size:11px;color:var(--sec);margin-top:12px}

  footer{margin-top:72px;padding-top:20px;border-top:1px solid var(--hair);
         font-family:var(--mono);font-size:11px;color:var(--sec);
         display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  /* ---------- mobile cards ---------- */
  .cards{display:none;flex-direction:column;gap:10px}
  .card{border:1px solid var(--hair);background:var(--panel);padding:14px 16px;cursor:pointer}
  .card.sel{background:var(--amber-dim)}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .card .tk{font-family:var(--mono);font-size:17px;font-weight:600}
  .card .g{font-family:var(--mono);font-size:17px;font-weight:600}
  .card .rows{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;
              font-family:var(--mono);font-size:12px;color:var(--sec)}
  .card .rows b{color:var(--ink);font-weight:400}

  @media(max-width:780px){
    .wrap{padding:0 14px 64px}
    .primary{grid-template-columns:1fr;gap:18px}
    .ptrigger{text-align:left}
    .primary .tick{font-size:30px}
    table{display:none}
    .cards{display:flex}
    .showing{margin-left:0;width:100%}
    .hdr-right{width:100%;justify-content:space-between}
  }
  @media(prefers-reduced-motion:no-preference){.rsmeter i{transition:width .6s ease}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">ALLUSKYROCKETSTOCKS <span>/ signal terminal</span></div>
    <div class="hdr-right">
      <div class="toggle">
        <button id="tgUS" class="on" onclick="setMarket('US')">US</button>
        <button id="tgIN" onclick="setMarket('IN')">INDIA</button>
      </div>
      <div class="stamp" id="stamp">—</div>
    </div>
  </header>

  <div class="lbl">Primary candidate <span class="meta" id="pmeta"></span></div>
  <div id="primary"></div>

  <div class="lbl">Signal watchlist <span class="meta" id="wmeta"></span></div>

  <div class="fbar">
    <div class="grp"><label>Sort</label>
      <select id="fSort">
        <option value="age_days">Age</option>
        <option value="gain_pct">Gain</option>
        <option value="streak">Streak</option>
        <option value="rs_pct">RS %</option>
        <option value="scan_date">Date</option>
        <option value="vol_ratio">Vol ×</option>
        <option value="risk_pct">Risk %</option>
      </select>
      <button class="btn" id="fDir" onclick="flipDir()">↓</button>
    </div>
    <div class="grp" id="statusBtns">
      <button class="btn f-all on" data-st="ALL">All</button>
      <button class="btn f-TRENDING" data-st="TRENDING">Trending</button>
      <button class="btn f-FADING" data-st="FADING">Fading</button>
      <button class="btn f-WATCHING" data-st="WATCHING">Watching</button>
      <button class="btn f-win" data-st="WINNERS">Winners ★</button>
    </div>
  </div>
  <div class="fbar">
    <div class="grp"><label>Streak ≥</label><input type="number" id="fStreak" min="0" placeholder="0"></div>
    <div class="grp"><label>Age</label>
      <input type="number" id="fAgeMin" min="0" placeholder="min" style="width:64px">
      <span class="sub">–</span>
      <input type="number" id="fAgeMax" min="0" placeholder="max" style="width:64px">
      <label>d</label></div>
    <button class="btn f-chk" id="fVolT" onclick="toggleChk('fVolT')">Vol ✓ today</button>
    <button class="btn f-chk" id="fBoxT" onclick="toggleChk('fBoxT')">Box ✓ today</button>
    <button class="btn" onclick="clearFilters()">Clear</button>
    <div class="showing" id="count"></div>
  </div>

  <table>
    <thead><tr id="thead"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="cards" id="cards"></div>
  <div class="detail" id="detail"></div>

  <div class="lbl">Open positions</div>
  <div class="strip" id="positions"></div>

  <div class="lbl">Edge report <span class="meta">measured outcomes, not opinions</span></div>
  <div id="edge"></div>

  <footer>
    <div>Darvas trigger · trend-gated · RS-ranked · 2% risk rule</div>
    <div>The journal is the discipline. The dashboard is just the tool.</div>
  </footer>
</div>

<script>
let DATA=null, MARKET='US', DIR=-1, STATUS='ALL', SELECTED=null;
const ACCOUNT={US:1800, IN:25000};
const fmt=(v,d=2)=>v==null?'—':Number(v).toFixed(d);
const today=()=>new Date().toISOString().slice(0,10);

const COLS=[
  {k:'ticker',label:'Ticker'},
  {k:'price',label:'Breakout'},
  {k:'now_price',label:'Now'},
  {k:'gain_pct',label:'Gain'},
  {k:'age_days',label:'Age'},
  {k:'streak',label:'Streak'},
  {k:'rs_pct',label:'RS %'},
  {k:'box_bottom_now',label:'Box @ now → Stop'},
  {k:'box_today',label:'Today'},
];

async function load(){
  try{
    const r=await fetch('data.json?'+Date.now());
    DATA=await r.json();
    document.getElementById('stamp').textContent=
      'scan '+DATA.generated.replace('T',' ').slice(0,16)+' UTC';
    render();
  }catch(e){
    document.getElementById('primary').innerHTML=
      '<div class="empty">data.json not found. Run the workflow once, or serve via http (not file://).</div>';
  }
}
function mkt(){return DATA.markets[MARKET];}
function cur(){return mkt().currency;}

function setMarket(m){
  MARKET=m; SELECTED=null;
  document.getElementById('tgUS').classList.toggle('on',m==='US');
  document.getElementById('tgIN').classList.toggle('on',m==='IN');
  render();
}
function flipDir(){DIR=-DIR;document.getElementById('fDir').textContent=DIR<0?'↓':'↑';renderTable();}
function toggleChk(id){document.getElementById(id).classList.toggle('on');renderTable();}
function clearFilters(){
  ['fStreak','fAgeMin','fAgeMax'].forEach(i=>document.getElementById(i).value='');
  ['fVolT','fBoxT'].forEach(i=>document.getElementById(i).classList.remove('on'));
  STATUS='ALL'; syncStatusBtns(); document.getElementById('fSort').value='age_days';
  DIR=-1; document.getElementById('fDir').textContent='↓'; renderTable();
}
function syncStatusBtns(){
  document.querySelectorAll('#statusBtns .btn').forEach(b=>
    b.classList.toggle('on',b.dataset.st===STATUS));
}
document.getElementById('statusBtns').addEventListener('click',e=>{
  const b=e.target.closest('.btn'); if(!b)return;
  STATUS=b.dataset.st;
  if(STATUS==='WINNERS'){document.getElementById('fSort').value='gain_pct';DIR=-1;document.getElementById('fDir').textContent='↓';}
  syncStatusBtns(); renderTable();
});

function filtered(){
  const st=parseInt(document.getElementById('fStreak').value);
  const a0=parseInt(document.getElementById('fAgeMin').value);
  const a1=parseInt(document.getElementById('fAgeMax').value);
  const volT=document.getElementById('fVolT').classList.contains('on');
  const boxT=document.getElementById('fBoxT').classList.contains('on');
  const key=document.getElementById('fSort').value;
  let rows=mkt().signals.slice();
  if(STATUS==='WINNERS') rows=rows.filter(s=>(s.gain_pct??0)>0&&(s.age_days??0)>=2&&s.box_today!==false);
  else if(STATUS!=='ALL') rows=rows.filter(s=>s.status===STATUS);
  if(!isNaN(st)) rows=rows.filter(s=>(s.streak??0)>=st);
  if(!isNaN(a0)) rows=rows.filter(s=>(s.age_days??0)>=a0);
  if(!isNaN(a1)) rows=rows.filter(s=>(s.age_days??1e9)<=a1);
  if(volT) rows=rows.filter(s=>s.vol_today===true);
  if(boxT) rows=rows.filter(s=>s.box_today===true);
  rows.sort((a,b)=>{
    const va=a[key]??-Infinity, vb=b[key]??-Infinity;
    return (va<vb?-1:va>vb?1:0)*DIR;
  });
  return rows;
}

function render(){renderPrimary();renderTable();renderPositions();renderEdge();renderDetail();}

function renderPrimary(){
  const t=today();
  const todays=mkt().signals.filter(s=>s.scan_date===t&&s.trend_pass)
    .sort((a,b)=>(b.rs_pct??0)-(a.rs_pct??0));
  document.getElementById('pmeta').textContent=
    todays.length?`strongest RS of ${todays.length} qualified today`:'';
  const el=document.getElementById('primary');
  if(!todays.length){
    el.innerHTML='<div class="empty">No qualified breakouts today. No trade is a position.</div>';return;
  }
  const s=todays[0];
  el.innerHTML=`<div class="primary">
    <div class="tick">${s.ticker}<small>${s.scan_date}</small></div>
    <div class="pgrid">
      <div class="stat"><b class="num">${cur()}${fmt(s.price)}</b><span>price</span></div>
      <div class="stat"><b class="num">${cur()}${fmt(s.box_top)}</b><span>box top</span></div>
      <div class="stat"><b class="num">${fmt(s.vol_ratio,1)}×</b><span>volume</span></div>
      <div class="stat"><b class="num acc">${fmt(s.rs_pct,0)}</b><span>rs percentile</span></div>
      <div class="stat"><b class="num down">${cur()}${fmt(s.suggested_stop)}</b><span>stop</span></div>
      <div class="stat"><b class="num">${fmt(s.rr_ratio,1)}</b><span>r : r</span></div>
      <div class="rsmeter"><i style="width:${s.rs_pct??0}%"></i></div>
    </div>
    <div class="ptrigger">BREAKOUT<br>CONFIRMED</div>
  </div>`;
}

function renderTable(){
  const key=document.getElementById('fSort').value;
  document.getElementById('thead').innerHTML=COLS.map(c=>
    `<th class="${key===c.k?'sorted':''}" onclick="sortBy('${c.k}')">${c.label}${key===c.k?(DIR<0?' ↓':' ↑'):''}</th>`).join('');
  const rows=filtered(), total=mkt().signals.length;
  const trend=mkt().signals.filter(s=>s.status==='TRENDING').length;
  const fade=mkt().signals.filter(s=>s.status==='FADING').length;
  document.getElementById('wmeta').textContent=
    `${total} tracked · ${trend} trending · ${fade} fading`;
  document.getElementById('count').textContent=`showing ${rows.length} of ${total}`;
  document.getElementById('tbody').innerHTML=rows.map(s=>{
    const fresh=s.scan_date===today();
    const g=s.gain_pct;
    const limit=s.suggested_stop?(s.suggested_stop*0.997):null;
    return `<tr class="${SELECTED===s.id?'sel':''}" onclick="select(${s.id})">
      <td class="tick-cell">${s.ticker}${fresh?'<span class="bdg b-new">NEW</span>':''}${s.status?`<span class="bdg b-${s.status}">${s.status}</span>`:''}</td>
      <td>${cur()}${fmt(s.price)} <span class="sub">· ${s.scan_date.slice(5)}</span></td>
      <td>${s.now_price!=null?cur()+fmt(s.now_price):'<span class="sub">—</span>'}</td>
      <td class="${g>0?'up':g<0?'down':''}">${g!=null?(g>0?'+':'')+fmt(g,1)+'%':'<span class="sub">—</span>'}</td>
      <td>${s.age_days!=null?s.age_days+'d':'—'}</td>
      <td>${s.streak!=null?`<b>${s.streak}</b> <span class="sub">(peak ${s.peak_streak})</span>`:'<span class="sub">—</span>'}</td>
      <td>${s.rs_pct!=null?fmt(s.rs_pct,0):'<span class="sub">—</span>'}</td>
      <td>${s.box_bottom_now!=null?
          `<span class="sub">${cur()}${fmt(s.box_bottom_now)}–${fmt(s.box_top_now)}</span> <span class="${s.box_pos==='inside'?'chk':s.box_pos==='above'?'acc':'x'}" style="font-size:10px">${(s.box_pos||'').toUpperCase()}</span><br>`+
          (s.clean_entry?`<span class="down">→ ${cur()}${fmt(s.entry_stop_now)}</span> <span class="sub">${fmt(s.entry_risk_now,1)}%</span>`
                        :`<span class="sub" style="font-size:11px">box too wide — no clean entry</span>`)
          :`<span class="down">${cur()}${fmt(s.suggested_stop)}</span>`}</td>
      <td>${s.vol_today==null?'<span class="sub">—</span>':
           `Vol <span class="${s.vol_today?'chk':'x'}">${s.vol_today?'✓':'✗'}</span> · Box <span class="${s.box_today?'chk':'x'}">${s.box_today?'✓':'✗'}</span>`}</td>
    </tr>`;
  }).join('');
  document.getElementById('cards').innerHTML=rows.map(s=>{
    const fresh=s.scan_date===today();
    const g=s.gain_pct;
    return `<div class="card ${SELECTED===s.id?'sel':''}" onclick="select(${s.id})">
      <div class="top"><span class="tk">${s.ticker}${fresh?'<span class="bdg b-new">NEW</span>':''}${s.status?`<span class="bdg b-${s.status}">${s.status}</span>`:''}</span>
        <span class="g ${g>0?'up':g<0?'down':''}">${g!=null?(g>0?'+':'')+fmt(g,1)+'%':'—'}</span></div>
      <div class="rows">
        <span>${cur()}${fmt(s.price)} → <b>${s.now_price!=null?cur()+fmt(s.now_price):'—'}</b></span>
        <span>age <b>${s.age_days!=null?s.age_days+'d':'—'}</b> · streak <b>${s.streak??'—'}</b></span>
        <span>RS <b class="acc">${s.rs_pct!=null?fmt(s.rs_pct,0):'—'}</b> · vol <b>${fmt(s.vol_ratio,1)}×</b></span>
        <span>${s.box_bottom_now!=null?`box ${cur()}${fmt(s.box_bottom_now)}–${fmt(s.box_top_now)} <span class="${s.box_pos==='inside'?'chk':s.box_pos==='above'?'acc':'x'}">${(s.box_pos||'').toUpperCase()}</span>`:'stop'} ${s.box_bottom_now!=null&&!s.clean_entry?'<span class="sub">→ too wide</span>':`<b class="down">→ ${cur()}${fmt(s.entry_stop_now??s.suggested_stop)}</b>${s.entry_risk_now!=null?` <span class="sub">(${fmt(s.entry_risk_now,1)}%)</span>`:''}`}</span>
        <span>${s.vol_today==null?'—':`Vol <b class="${s.vol_today?'chk':'x'}">${s.vol_today?'✓':'✗'}</b> · Box <b class="${s.box_today?'chk':'x'}">${s.box_today?'✓':'✗'}</b>`}</span>
      </div>
    </div>`;
  }).join('');
}
function sortBy(k){
  const sel=document.getElementById('fSort');
  if(sel.value===k){flipDir();return;}
  sel.value=k; DIR=-1; document.getElementById('fDir').textContent='↓'; renderTable();
}
function select(id){SELECTED=SELECTED===id?null:id;renderTable();renderDetail();}

function renderDetail(){
  const el=document.getElementById('detail');
  const s=mkt().signals.find(x=>x.id===SELECTED);
  if(!s){el.classList.remove('on');return;}
  const acct=ACCOUNT[MARKET], riskAmt=acct*0.02;
  const perShare=s.price-(s.suggested_stop||s.price);
  const maxShares=perShare>0?Math.floor(riskAmt/perShare):0;
  const yq=MARKET==='IN'?s.ticker+'.NS':s.ticker;
  const ref=MARKET==='IN'
    ?`<a href="https://www.screener.in/company/${s.ticker}/" target="_blank">Screener.in</a>`
    :`<a href="https://finviz.com/quote.ashx?t=${s.ticker}" target="_blank">Finviz</a>`;
  el.classList.add('on');
  el.innerHTML=`<h3>${s.ticker}<em>${s.scan_date} · ${(s.source||'').replace('migration_','legacy ')}</em></h3>
    <div class="dgrid">
      <div class="stat"><b class="num">${cur()}${fmt(s.price)} → ${s.now_price!=null?cur()+fmt(s.now_price):'—'}</b><span>breakout → now</span></div>
      <div class="stat"><b class="num ${s.gain_pct>0?'up':s.gain_pct<0?'down':''}">${s.gain_pct!=null?(s.gain_pct>0?'+':'')+fmt(s.gain_pct,1)+'%':'—'}</b><span>gain since alert</span></div>
      <div class="stat"><b class="num">${cur()}${fmt(s.box_bottom)}–${fmt(s.box_top)}</b><span>darvas box</span></div>
      <div class="stat"><b class="num">${fmt(s.vol_ratio,1)}×</b><span>vol at breakout</span></div>
      <div class="stat"><b class="num acc">${s.rs_pct!=null?fmt(s.rs_pct,0):'—'}</b><span>rs percentile</span></div>
      <div class="stat"><b class="num">${s.rs_excess!=null?fmt(s.rs_excess,1)+'pp':'—'}</b><span>vs benchmark 63d</span></div>
      <div class="stat"><b class="num down">${cur()}${fmt(s.suggested_stop)}</b><span>stop · risk ${fmt(s.risk_pct,1)}%</span></div>
      <div class="stat"><b class="num">${s.streak!=null?s.streak+' (peak '+s.peak_streak+')':'—'}</b><span>streak above box</span></div>
      <div class="stat"><b class="num">${s.trend_detail||'legacy — not gated'}</b><span>trend gate</span></div>
      <div class="stat"><b class="num">${s.ret_d30!=null?fmt(s.ret_d30,1)+'%':'pending'}</b><span>outcome 30d</span></div>
    </div>
    <div class="sizing">2% rule @ ${cur()}${acct.toLocaleString()} → max loss ${cur()}${riskAmt.toFixed(0)}
      → <b>max ${maxShares} shares</b> at this stop. These numbers must match the journal.</div>
    <div class="links">
      ${ref}
      <a href="https://finance.yahoo.com/quote/${yq}" target="_blank">Yahoo</a>
      <a href="https://www.tradingview.com/chart/?symbol=${MARKET==='IN'?'NSE:'+s.ticker:s.ticker}" target="_blank">TradingView</a>
    </div>`;
}

function renderPositions(){
  const el=document.getElementById('positions');
  const pos=mkt().positions;
  if(!pos.length){el.innerHTML='<div class="empty">No open positions. Cash is a position too.</div>';return;}
  el.innerHTML=pos.map(p=>{
    const pl=p.pl_amount, plp=p.pl_pct, cls=pl>0?'up':pl<0?'down':'';
    return `<div class="pos">
      <div class="t" style="display:flex;justify-content:space-between;align-items:baseline">
        <span>${p.ticker}</span>
        <span class="num ${cls}" style="font-size:15px">${pl!=null?(pl<0?'-':'+')+cur()+Math.abs(pl).toFixed(2):'—'}</span></div>
      ${plp!=null?`<div class="row"><span>return</span><b class="num ${cls}">${(plp>0?'+':'')+fmt(plp,1)}%</b></div>`:''}
      <div class="row"><span>now</span><b class="num">${p.now_price!=null?cur()+fmt(p.now_price):'—'}</b></div>
      <div class="row"><span>shares</span><b class="num">${p.shares}</b></div>
      <div class="row"><span>entry</span><b class="num">${cur()}${fmt(p.entry_price)} · ${p.entry_date}</b></div>
      <div class="row"><span>${p.stop_moved?'trailing stop':'initial stop'}</span><b class="num acc">${cur()}${fmt(p.current_stop??p.initial_stop)}${p.stop_moved?' \u2191':''}</b></div>
    </div>`;
  }).join('');
}

function renderEdge(){
  const el=document.getElementById('edge');
  const e=mkt().edge;
  if(!e||!e.n_signals){
    el.innerHTML='<div class="empty">No measured outcomes yet. The analyzer backfills 7/14/30-day returns as signals age — the edge report builds itself from here.</div>';return;
  }
  const c=(v,s,cls='')=>`<div class="cell"><b class="num ${cls}">${v}</b><span>${s}</span></div>`;
  el.innerHTML=`<div class="edge">
    ${c(e.n_signals,'signals measured')}
    ${e.d7 ?c(e.d7.hit_rate+'%','hit rate · 7d',e.d7.hit_rate>=50?'up':'down'):''}
    ${e.d30?c(e.d30.hit_rate+'%','hit rate · 30d',e.d30.hit_rate>=50?'up':'down'):''}
    ${e.d30?c((e.d30.avg>0?'+':'')+fmt(e.d30.avg,1)+'%','avg return · 30d',e.d30.avg>0?'up':'down'):''}
    ${e.d30?c((e.d30.median>0?'+':'')+fmt(e.d30.median,1)+'%','median · 30d',e.d30.median>0?'up':'down'):''}
    ${e.stop_hit_rate!=null?c(e.stop_hit_rate+'%','stops hit · 30d',e.stop_hit_rate>40?'down':''):''}
  </div>
  <div class="note">Positive 30-day expectancy after 50+ signals = edge. Anything else = keep paper trading.</div>`;
}

['fStreak','fAgeMin','fAgeMax'].forEach(id=>
  document.getElementById(id).addEventListener('input',renderTable));
document.getElementById('fSort').addEventListener('change',renderTable);
load();
</script>
</body>
</html>
